name: Deploy systemd units to VPS

on:
  push:
    branches: [main]
    paths:
      - 'deploy/*.service'
      - 'deploy/*.timer'
      - 'deploy/*.conf'
  workflow_dispatch:

concurrency:
  group: deploy-systemd
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload unit files to VPS /tmp/deploy-systemd/
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/*.service,deploy/*.timer,deploy/*.conf"
          target: "/tmp/deploy-systemd-staging/"
          strip_components: 1
          rm: true

      - name: Diff + install + daemon-reload + restart changed timers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            STAGE=/tmp/deploy-systemd-staging
            TARGET=/etc/systemd/system
            changed_timers=()
            changed_any=0

            # Daemon services: install unit file (daemon-reload picks up changes)
            # but do NOT restart — next lark-bot app deploy restarts them.
            DAEMON_SERVICES="lark-bot-ws.service tiktok-gateway.service"

            shopt -s nullglob
            for src in "$STAGE"/*.service "$STAGE"/*.timer; do
              name=$(basename "$src")
              dst="$TARGET/$name"
              if [ -f "$dst" ] && cmp -s "$src" "$dst"; then
                echo "unchanged: $name"
                continue
              fi

              echo "install:   $name"
              sudo install -m 0644 -o root -g root "$src" "$dst"
              changed_any=1

              # Only restart timers (oneshot triggers).
              # Daemon services get daemon-reload but no restart.
              case "$name" in
                *.timer) changed_timers+=("$name") ;;
              esac
              case " $DAEMON_SERVICES " in
                *" $name "*) echo "  (daemon — no restart, effective on next app deploy)" ;;
              esac
            done

            # Deploy journald / other conf drop-ins
            for src in "$STAGE"/*.conf; do
              name=$(basename "$src")
              dst="/etc/systemd/journald.conf.d/$name"
              sudo mkdir -p /etc/systemd/journald.conf.d
              if [ -f "$dst" ] && cmp -s "$src" "$dst"; then
                echo "unchanged: $name"
                continue
              fi
              echo "install:   $name → journald.conf.d/"
              sudo install -m 0644 -o root -g root "$src" "$dst"
              changed_any=1
              sudo systemctl restart systemd-journald
              echo "journald restarted"
            done

            if [ "$changed_any" -eq 0 ]; then
              echo "no changes, nothing to reload"
              exit 0
            fi

            sudo systemctl daemon-reload
            echo "daemon-reload OK"

            # enable + restart is idempotent on already-enabled timers
            # and is required for brand-new timer files so Persistent=true
            # survives reboots.
            for t in "${changed_timers[@]}"; do
              sudo systemctl enable "$t"
              sudo systemctl restart "$t"
              sudo systemctl is-active --quiet "$t" \
                && echo "enable+restart OK: $t" \
                || { echo "restart FAILED: $t"; exit 1; }
            done

            echo "Deploy systemd OK"

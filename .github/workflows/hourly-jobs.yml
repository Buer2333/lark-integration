name: Hourly Jobs
run-name: "${{ github.event_name == 'repository_dispatch' && '🔄 Cron-job.org' || '🧪 Manual Test' }}"

on:
  repository_dispatch:
    types: [hourly-trigger]
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ad_report
          - balance_alert
          - ban_alert

concurrency:
  group: hourly-jobs
  cancel-in-progress: false

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lark-bot
        uses: actions/checkout@v4
        with:
          repository: Buer2333/lark-bot
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ad_report
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'ad_report' || github.event_name == 'repository_dispatch' }}
        env:
          TIKTOK_APP_ID: ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_SECRET: ${{ secrets.TIKTOK_SECRET }}
          TIKTOK_ACCESS_TOKEN_XINCHENG: ${{ secrets.TIKTOK_ACCESS_TOKEN_XINCHENG }}
          TIKTOK_ACCESS_TOKEN_ZECHENG: ${{ secrets.TIKTOK_ACCESS_TOKEN_ZECHENG }}
          TIKTOK_SHOP_CREDENTIALS: ${{ secrets.TIKTOK_SHOP_CREDENTIALS }}
          FEISHU_WEBHOOK_AD_REPORT: ${{ secrets.FEISHU_WEBHOOK_AD_REPORT }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          REFRESHED_CREDS_PATH: /tmp/refreshed_creds.json
        run: python run.py ad_report

      - name: Sync ad cost cache seed
        if: ${{ always() }}
        run: |
          if git diff --quiet data/ad_cost_seed.json 2>/dev/null; then
            echo "No cache changes to sync"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ad_cost_seed.json
            git commit -m "auto: sync ad cost cache seed [skip ci]"
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/Buer2333/lark-bot.git HEAD:main
            echo "Cache seed synced"
          fi

      - name: Update shop credentials secret
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f /tmp/refreshed_creds.json ]; then
            gh secret set TIKTOK_SHOP_CREDENTIALS -R Buer2333/lark-integration < /tmp/refreshed_creds.json
            echo "Shop credentials secret updated"
          else
            echo "No refreshed credentials file, skipping"
          fi

      - name: Run balance_alert
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'balance_alert' || github.event_name == 'repository_dispatch' }}
        env:
          TIKTOK_APP_ID: ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_SECRET: ${{ secrets.TIKTOK_SECRET }}
          TIKTOK_ACCESS_TOKEN_XINCHENG: ${{ secrets.TIKTOK_ACCESS_TOKEN_XINCHENG }}
          TIKTOK_ACCESS_TOKEN_ZECHENG: ${{ secrets.TIKTOK_ACCESS_TOKEN_ZECHENG }}
          FEISHU_WEBHOOK_BALANCE_ALERT: ${{ secrets.FEISHU_WEBHOOK_BALANCE_ALERT }}
          FEISHU_BALANCE_MENTION_ID: ${{ secrets.FEISHU_BALANCE_MENTION_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: python run.py balance_alert

      - name: Run ban_alert
        if: ${{ github.event.inputs.job == 'all' || github.event.inputs.job == 'ban_alert' || github.event_name == 'repository_dispatch' }}
        env:
          TIKTOK_APP_ID: ${{ secrets.TIKTOK_APP_ID }}
          TIKTOK_SECRET: ${{ secrets.TIKTOK_SECRET }}
          TIKTOK_ACCESS_TOKEN_XINCHENG: ${{ secrets.TIKTOK_ACCESS_TOKEN_XINCHENG }}
          TIKTOK_ACCESS_TOKEN_ZECHENG: ${{ secrets.TIKTOK_ACCESS_TOKEN_ZECHENG }}
          FEISHU_WEBHOOK_BALANCE_ALERT: ${{ secrets.FEISHU_WEBHOOK_BALANCE_ALERT }}
          FEISHU_BALANCE_MENTION_ID: ${{ secrets.FEISHU_BALANCE_MENTION_ID }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: python run.py ban_alert

name: Dump lark-bot cache

# One-off utility: restore the actions/cache used by hourly-jobs.yml and
# upload it as an artifact so we can ship it to the VPS. Needed because
# VPS hourly-jobs.timer runs with an empty ~/.cache/lark-bot and mis-classifies
# 47 historically-banned accounts as newly-banned, and omits their
# cached historical spend from ad_report totals.
#
# After download: gh run download <run_id> -n lark-bot-cache
# Then: tar -xzf lark-bot-cache.tar.gz && scp to VPS.

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Restore API response cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/lark-bot
          key: lark-bot-cache-dump-${{ github.run_id }}
          restore-keys: |
            lark-bot-cache-

      - name: List + tar cache
        run: |
          set -euo pipefail
          if [ ! -d "$HOME/.cache/lark-bot" ]; then
            echo "ERROR: ~/.cache/lark-bot does not exist — cache miss"
            exit 1
          fi
          echo "=== cache contents ==="
          ls -la "$HOME/.cache/lark-bot"
          echo "=== byte sizes ==="
          du -b "$HOME/.cache/lark-bot"/* | sort -n
          tar -czvf /tmp/lark-bot-cache.tar.gz -C "$HOME/.cache" lark-bot
          echo "=== tarball ==="
          ls -la /tmp/lark-bot-cache.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lark-bot-cache
          path: /tmp/lark-bot-cache.tar.gz
          retention-days: 1
